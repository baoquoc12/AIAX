services:
  - type: web
    name: aiax
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: APP_LANGUAGE
        value: vi
      - key: INSECURE_TLS
        value: "false"
      - key: STORAGE_LOCAL_PATH
        value: /data/storage
      - key: DATABASE_PATH
        value: /data/drama_generator.db
      - key: VIDEO_GENERATION_TIMEOUT_MINUTES
        value: 60
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
